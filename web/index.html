<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>上海地铁路径规划系统</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --primary: #4f46e5;  --primary-light: #818cf8;  --primary-dark: #3730a3;
    --success: #10b981;  --danger: #ef4444;         --warning: #f59e0b;
    --bg-grad-1: #667eea; --bg-grad-2: #764ba2;
    --card-bg: rgba(255, 255, 255, 0.96);
    --card-shadow: 0 8px 32px rgba(0, 0, 0, 0.12);
    --text-main: #1f2937; --text-muted: #6b7280; --border: #e5e7eb;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                 "PingFang SC", "Microsoft YaHei", sans-serif;
    background: linear-gradient(135deg, var(--bg-grad-1) 0%, var(--bg-grad-2) 100%);
    min-height: 100vh; color: var(--text-main); line-height: 1.6;
  }
  /* 顶栏 */
  .topbar {
    background: rgba(255, 255, 255, 0.15);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    color: #fff; padding: 18px 32px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid rgba(255, 255, 255, 0.2);
  }
  .topbar h1 { font-size: 22px; font-weight: 600; }
  .topbar .badge {
    background: rgba(255,255,255,.25); padding: 4px 12px;
    border-radius: 12px; font-size: 12px;
  }
  /* 布局 */
  .container {
    max-width: 1280px; margin: 24px auto; padding: 0 16px;
    display: grid; grid-template-columns: 1.4fr 1fr; gap: 24px;
  }
  @media (max-width: 900px) { .container { grid-template-columns: 1fr; } }
  /* 卡片 */
  .card {
    background: var(--card-bg); border-radius: 16px; padding: 24px;
    box-shadow: var(--card-shadow); backdrop-filter: blur(8px);
  }
  .card h2 {
    font-size: 18px; font-weight: 600; color: var(--primary-dark);
    margin-bottom: 16px; display: flex; align-items: center; gap: 8px;
  }
  .card h2::before {
    content: ""; width: 4px; height: 18px;
    background: var(--primary); border-radius: 2px;
  }
  /* 表单 */
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  label {
    display: block; font-size: 12px; color: var(--text-muted);
    margin-bottom: 4px; font-weight: 500;
  }
  input, select {
    width: 100%; padding: 9px 12px; border: 1px solid var(--border);
    border-radius: 8px; font-size: 14px; transition: all 0.2s; background: #fff;
  }
  input:focus, select:focus {
    outline: none; border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.12);
  }
  /* 按钮 */
  .btn {
    padding: 10px 20px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; display: inline-flex; align-items: center; gap: 6px;
  }
  .btn-primary { background: var(--primary); color: #fff; }
  .btn-primary:hover  { background: var(--primary-dark); transform: translateY(-1px); }
  .btn-primary:disabled { background: #9ca3af; cursor: not-allowed; transform: none; }
  .btn-ghost { background: transparent; color: var(--primary); border: 1px solid var(--primary); }
  .btn-ghost:hover { background: var(--primary); color: #fff; }
  .btn-row { display: flex; gap: 8px; margin-top: 16px; }
  /* 开关 */
  .mode-switch {
    display: flex; background: #f3f4f6; border-radius: 8px; padding: 4px; margin-bottom: 12px;
  }
  .mode-switch button {
    flex: 1; border: none; background: transparent; padding: 8px;
    border-radius: 6px; cursor: pointer; font-size: 13px;
    transition: all 0.2s; color: var(--text-muted);
  }
  .mode-switch button.active {
    background: #fff; color: var(--primary);
    box-shadow: 0 1px 3px rgba(0,0,0,.1); font-weight: 500;
  }
  /* 路径结果 */
  .result-area { margin-top: 18px; min-height: 60px; }
  .path-card {
    background: linear-gradient(135deg, #f0f9ff 0%, #e0e7ff 100%);
    border: 1px solid #c7d2fe; border-radius: 10px; padding: 14px; margin-bottom: 10px;
  }
  .path-meta { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 10px; }
  .meta-tag {
    background: #fff; border: 1px solid var(--border);
    padding: 3px 10px; border-radius: 12px; font-size: 12px; color: var(--text-muted);
  }
  .meta-tag b { color: var(--primary); }
  .path-pretty {
    background: #fff; border-radius: 8px; padding: 12px;
    font-size: 13px; line-height: 1.8;
    white-space: pre-wrap; word-break: break-word; color: var(--text-main);
    font-family: ui-monospace, "Cascadia Code", "Consolas", monospace;
  }
  .path-pretty .line-tag {
    display: inline-block; background: var(--primary); color: #fff;
    border-radius: 4px; padding: 1px 6px; font-size: 11px; margin: 0 2px;
  }
  .path-pretty .transfer { color: var(--warning); font-weight: 500; }
  .path-list-title { font-size: 13px; color: var(--text-muted); margin: 12px 0 6px; font-weight: 500; }
  /* 提示 */
  .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 10px; }
  .alert-info  { background: #dbeafe; color: #1e40af; }
  .alert-error { background: #fee2e2; color: #991b1b; }
  .alert-success{background: #d1fae5; color: #065f46; }
  /* 站点列表 */
  .station-toolbar { display: flex; gap: 8px; margin-bottom: 12px; }
  .station-toolbar input { flex: 1; }
  .station-list {
    max-height: 540px; overflow-y: auto;
    border: 1px solid var(--border); border-radius: 10px;
  }
  .station-list::-webkit-scrollbar       { width: 6px; }
  .station-list::-webkit-scrollbar-thumb { background: #c7d2fe; border-radius: 3px; }
  .station-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 14px; border-bottom: 1px solid #f3f4f6; transition: background 0.15s;
  }
  .station-item:last-child { border-bottom: none; }
  .station-item:hover { background: #f9fafb; }
  .station-info { display: flex; align-items: center; gap: 10px; min-width: 0; flex: 1; }
  .station-name { font-weight: 500; }
  .station-line {
    background: #ede9fe; color: var(--primary-dark);
    padding: 2px 8px; border-radius: 4px; font-size: 11px; white-space: nowrap;
  }
  .station-status { font-size: 12px; padding: 2px 8px; border-radius: 12px; white-space: nowrap; }
  .station-status.open   { background: #d1fae5; color: #065f46; }
  .station-status.closed { background: #fee2e2; color: #991b1b; }
  /* iOS 风格开关 */
  .switch {
    position: relative; width: 44px; height: 24px; background: #d1d5db;
    border-radius: 12px; cursor: pointer; transition: background 0.25s; flex-shrink: 0;
  }
  .switch.on { background: var(--success); }
  .switch::after {
    content: ""; position: absolute; top: 2px; left: 2px;
    width: 20px; height: 20px; background: #fff; border-radius: 50%;
    transition: transform 0.25s; box-shadow: 0 1px 3px rgba(0,0,0,.2);
  }
  .switch.on::after { transform: translateX(20px); }
  /* Loading */
  .loading { text-align: center; padding: 24px; color: var(--text-muted); font-size: 13px; }
  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid var(--primary-light); border-top-color: var(--primary);
    border-radius: 50%; animation: spin 0.8s linear infinite;
    vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  /* 统计 */
  .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 12px; }
  .stat-box {
    background: #f9fafb; border: 1px solid var(--border);
    border-radius: 8px; padding: 10px; text-align: center;
  }
  .stat-num   { font-size: 20px; font-weight: 600; color: var(--primary); }
  .stat-label { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
</style>
</head>
<body>
  <header class="topbar">
    <h1>🚇 上海地铁路径规划与管理系统</h1>
    <span class="badge" id="health-badge">Web 桥接服务</span>
  </header>

  <div class="container">
    <!-- ========== 路径规划 ========== -->
    <section class="card">
      <h2>路径规划</h2>
      <div class="form-row">
        <div>
          <label>起点站</label>
          <input id="start-name" list="stations-datalist" placeholder="如: 莘庄">
        </div>
        <div>
          <label>起点线路(可选)</label>
          <input id="start-line" placeholder="如: 1号线 (留空=默认第一匹配)">
        </div>
      </div>
      <div class="form-row">
        <div>
          <label>终点站</label>
          <input id="end-name" list="stations-datalist" placeholder="如: 陆家嘴">
        </div>
        <div>
          <label>终点线路(可选)</label>
          <input id="end-line" placeholder="如: 2号线">
        </div>
      </div>

      <label>优化目标</label>
      <div class="mode-switch" id="mode-switch">
        <button data-mode="time"     class="active">⏱️ 时间最短</button>
        <button data-mode="transfer">🔄 换乘最少</button>
      </div>

      <label>返回路径数</label>
      <div class="mode-switch" id="k-switch">
        <button data-k="0" class="active">单条最优</button>
        <button data-k="3">K=3 候选</button>
      </div>

      <div class="btn-row">
        <button class="btn btn-primary" id="btn-query">查询路径</button>
        <button class="btn btn-ghost"   id="btn-clear">清空结果</button>
      </div>
      <div class="result-area" id="query-result"></div>
    </section>

    <!-- ========== 站点管理 ========== -->
    <section class="card">
      <h2>站点管理</h2>
      <div class="stats" id="stats">
        <div class="stat-box"><div class="stat-num" id="stat-total">-</div><div class="stat-label">总站点</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-open">-</div><div class="stat-label">开放</div></div>
        <div class="stat-box"><div class="stat-num" id="stat-closed">-</div><div class="stat-label">关闭</div></div>
      </div>
      <div class="station-toolbar">
        <input id="station-search" placeholder="🔍 搜索站点 (按名称过滤)">
        <button class="btn btn-ghost" id="btn-reset">恢复初始</button>
      </div>
      <div class="station-list" id="station-list">
        <div class="loading"><span class="spinner"></span>正在加载站点列表...</div>
      </div>
    </section>
  </div>

  <datalist id="stations-datalist"></datalist>

<script>
const API = '';
let allStations = [];
let currentMode = 'time';
let currentK = 0;

const $ = id => document.getElementById(id);
const escapeHtml = s => String(s ?? '').replace(/[&<>"']/g, c => ({
  '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
}[c]));

function showAlert(area, type, msg) {
  area.innerHTML = `<div class="alert alert-${type}">${escapeHtml(msg)}</div>`;
}
function showLoading(area, msg='请求中...') {
  area.innerHTML = `<div class="loading"><span class="spinner"></span>${escapeHtml(msg)}</div>`;
}
function prettyToHtml(text) {
  if (!text) return '';
  return text.split('\n').map(line => {
    let l = escapeHtml(line);
    l = l.replace(/\[([^\]]+)\]/g, '<span class="line-tag">$1</span>');
    l = l.replace(/(站内换乘至[^\n]+)/g, '<span class="transfer">$1</span>');
    l = l.replace(/(总耗时: \d+ 分钟)/g, '<b>$1</b>');
    return l;
  }).join('\n');
}

async function api(path, options={}) {
  const res = await fetch(API + path, options);
  const ct = res.headers.get('content-type') || '';
  if (ct.includes('application/json')) return await res.json();
  throw new Error(await res.text() || `HTTP ${res.status}`);
}

// 模式开关
document.querySelectorAll('#mode-switch button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('#mode-switch button').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); currentMode = b.dataset.mode;
  };
});
document.querySelectorAll('#k-switch button').forEach(b => {
  b.onclick = () => {
    document.querySelectorAll('#k-switch button').forEach(x => x.classList.remove('active'));
    b.classList.add('active'); currentK = parseInt(b.dataset.k, 10);
  };
});

// 路径查询
$('btn-query').onclick = async () => {
  const start = $('start-name').value.trim();
  const startLine = $('start-line').value.trim();
  const end = $('end-name').value.trim();
  const endLine = $('end-line').value.trim();
  const result = $('query-result');
  if (!start || !end) { showAlert(result, 'error', '请输入起点和终点站名'); return; }
  showLoading(result, '正在调用 C++ 算法引擎...');

  try {
    const params = new URLSearchParams({ start, end, mode: currentMode, k: currentK });
    if (startLine) params.set('start_line', startLine);
    if (endLine)   params.set('end_line', endLine);
    const data = await api('/api/subway/query?' + params);
    if (!data.ok) { showAlert(result, 'error', data.message || '查询失败'); return; }

    // 单条 (query / qtransfer)
    if (data.pretty) {
      result.innerHTML = `
        <div class="path-card">
          <div class="path-meta">
            <span class="meta-tag">⏱ 总耗时 <b>${data.total_time} 分钟</b></span>
            <span class="meta-tag">🔄 换乘 <b>${data.transfers} 次</b></span>
            <span class="meta-tag">🚉 途经 <b>${data.stops} 站</b></span>
            <span class="meta-tag">📍 实际 <b>${data.actual_stops} 站</b></span>
          </div>
          <div class="path-pretty">${prettyToHtml(data.pretty)}</div>
        </div>`;
    }
    // 多条 (k* 命令)
    else if (data.paths && data.paths.length) {
      let html = `<div class="path-list-title">共 ${data.paths.length} 条候选路径 (按 ${currentMode==='time'?'时间':'换乘'} 排序)</div>`;
      data.paths.forEach((p, i) => {
        html += `
          <div class="path-card">
            <div class="path-meta">
              <span class="meta-tag">候选 ${i+1}</span>
              <span class="meta-tag">⏱ <b>${p.total_time} 分钟</b></span>
              <span class="meta-tag">🔄 <b>${p.transfers} 次</b></span>
              <span class="meta-tag">🚉 <b>${p.stops} 站</b></span>
            </div>
            <div class="path-pretty">${prettyToHtml(p.pretty)}</div>
          </div>`;
      });
      result.innerHTML = html;
    } else {
      showAlert(result, 'info', '未找到可达路径, 请检查起点/终点或关闭的站点.');
    }
  } catch (e) {
    showAlert(result, 'error', '请求失败: ' + e.message);
  }
};
$('btn-clear').onclick = () => { $('query-result').innerHTML = ''; };

// 站点管理
async function loadStations() {
  const list = $('station-list');
  showLoading(list, '正在加载站点列表...');
  try {
    const data = await api('/api/subway/stations/all');
    if (!data.ok) { showAlert(list, 'error', data.message || '加载失败'); return; }
    allStations = data.items || [];
    updateDatalist(allStations);
    updateStats();
    renderStations(allStations);
  } catch (e) {
    showAlert(list, 'error', '请求失败: ' + e.message);
  }
}
function updateStats() {
  const total = allStations.length;
  const closed = allStations.filter(s => s.status === '关闭').length;
  $('stat-total').textContent  = total;
  $('stat-open').textContent   = total - closed;
  $('stat-closed').textContent = closed;
}
function updateDatalist(list) {
  const names = [...new Set(list.map(s => s.name))];
  $('stations-datalist').innerHTML = names.map(n => `<option value="${escapeHtml(n)}">`).join('');
}
function renderStations(list) {
  const el = $('station-list');
  if (!list.length) { el.innerHTML = '<div class="loading">无匹配站点</div>'; return; }
  list.sort((a, b) => a.name.localeCompare(b.name, 'zh-CN') || a.line.localeCompare(b.line, 'zh-CN'));
  el.innerHTML = list.map(s => {
    const isOpen = s.status !== '关闭';
    return `
      <div class="station-item">
        <div class="station-info">
          <span class="station-name">${escapeHtml(s.name)}</span>
          <span class="station-line">${escapeHtml(s.line)}</span>
        </div>
        <span class="station-status ${isOpen ? 'open' : 'closed'}">${escapeHtml(s.status)}</span>
        <div style="width:12px;"></div>
        <div class="switch ${isOpen ? 'on' : ''}" data-name="${escapeHtml(s.name)}" data-line="${escapeHtml(s.line)}"></div>
      </div>`;
  }).join('');
  el.querySelectorAll('.switch').forEach(sw => {
    sw.onclick = () => toggleStation(sw.dataset.name, sw.dataset.line, sw);
  });
}
$('station-search').oninput = e => {
  const kw = e.target.value.trim();
  renderStations(kw ? allStations.filter(s => s.name.includes(kw)) : allStations);
};

async function toggleStation(name, line, sw) {
  sw.style.pointerEvents = 'none';
  const newStatus = sw.classList.contains('on') ? '关闭' : '开启';
  try {
    const data = await api('/api/subway/station/toggle', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, line, status: newStatus })
    });
    if (!data.ok) { alert('切换失败: ' + (data.message || '')); return; }
    const item = sw.closest('.station-item');
    const st = item.querySelector('.station-status');
    if (newStatus === '关闭') {
      sw.classList.remove('on'); st.className = 'station-status closed'; st.textContent = '关闭';
    } else {
      sw.classList.add('on');    st.className = 'station-status open';   st.textContent = '开启';
    }
    const target = allStations.find(s => s.name === name && s.line === line);
    if (target) target.status = newStatus;
    updateStats();
  } catch (e) {
    alert('请求失败: ' + e.message);
  } finally {
    sw.style.pointerEvents = '';
  }
}
$('btn-reset').onclick = async () => {
  if (!confirm('确认恢复全部站点为初始开放状态?')) return;
  try {
    const data = await api('/api/subway/reset', { method: 'POST' });
    if (!data.ok) { alert('恢复失败: ' + (data.message || '')); return; }
    await loadStations();
    alert('已恢复初始状态');
  } catch (e) {
    alert('请求失败: ' + e.message);
  }
};

// 启动
loadStations();
fetch('/healthz').then(r => r.json()).then(h => {
  $('health-badge').textContent = h.main_web_exists ? '✅ 后端在线' : '⚠️ main_web 未编译';
}).catch(() => {});
</script>
</body>
</html>
